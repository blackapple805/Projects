<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>PLEXUS — body scan visualizer</title>
<style>
  :root{
    --bg:#06070a;
    --ink:#e8ecf4;
    --dim:#5a6478;
    --accent:#c9d2de;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:'SF Mono',ui-monospace,Menlo,Consolas,monospace;
    -webkit-user-select:none;user-select:none;touch-action:none}
  #stage{position:fixed;inset:0}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  video{display:none}

  /* ---------- start overlay ---------- */
  #gate{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:28px;background:radial-gradient(ellipse at 50% 60%, #0b0d14 0%, #06070a 70%);z-index:50;
    transition:opacity .6s ease}
  #gate.gone{opacity:0;pointer-events:none}
  #gate h1{font-size:clamp(34px,9vw,72px);font-weight:700;letter-spacing:.35em;text-indent:.35em;color:#eef2f8;
    text-shadow:0 0 30px rgba(200,215,235,.35)}
  #gate .sub{color:var(--dim);font-size:12px;letter-spacing:.15em;max-width:320px;text-align:center;line-height:1.7}
  #startBtn{padding:16px 44px;font:inherit;font-size:13px;letter-spacing:.3em;text-indent:.3em;
    color:#06070a;background:var(--accent);border:none;cursor:pointer;border-radius:2px;
    box-shadow:0 0 24px rgba(200,215,235,.35);transition:transform .15s,box-shadow .15s}
  #startBtn:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(200,215,235,.55)}
  #startBtn:active{transform:translateY(0)}
  #startBtn:disabled{opacity:.5;cursor:default;transform:none}
  #startBtn:focus-visible{outline:2px solid #fff;outline-offset:3px}
  #err{color:#ff5577;font-size:12px;display:none;max-width:320px;text-align:center;line-height:1.6}

  /* ---------- HUD ---------- */
  #hud{position:fixed;left:0;right:0;bottom:0;z-index:40;
    padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;
    background:linear-gradient(to top,rgba(6,7,10,.85),transparent);
    transition:transform .4s cubic-bezier(.16,1,.3,1),opacity .4s ease}
  #hud.hidden{transform:translateY(110%);opacity:0;pointer-events:none}
  .chip{display:flex;align-items:center;gap:6px;padding:7px 12px;font:inherit;font-size:11px;letter-spacing:.08em;
    color:var(--ink);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
    border-radius:999px;cursor:pointer;backdrop-filter:blur(8px);white-space:nowrap;
    transition:border-color .2s,color .2s,box-shadow .2s}
  .chip:focus-within{outline:2px solid var(--accent);outline-offset:2px}
  .chip.on{border-color:var(--accent);color:var(--accent);box-shadow:0 0 12px rgba(200,215,235,.2) inset}
  .chip.pending{opacity:.6}
  .chip input{appearance:none;width:0;height:0;position:absolute}
  .slider{display:flex;align-items:center;gap:8px;padding:7px 12px;font-size:11px;letter-spacing:.08em;
    color:var(--dim);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
    border-radius:999px;backdrop-filter:blur(8px)}
  .slider input{width:90px;accent-color:var(--accent)}
  #toggleHud{position:fixed;right:14px;top:calc(14px + env(safe-area-inset-top));z-index:41;
    width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,.15);
    background:rgba(6,7,10,.6);color:var(--dim);font:inherit;font-size:15px;cursor:pointer;backdrop-filter:blur(8px)}
  #toggleHud:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  #fps{position:fixed;left:14px;top:calc(14px + env(safe-area-inset-top));z-index:41;
    font-size:10px;letter-spacing:.15em;color:var(--dim);opacity:.7;pointer-events:none}
  #hint{position:fixed;left:50%;top:calc(16px + env(safe-area-inset-top));transform:translateX(-50%);
    z-index:41;font-size:10px;letter-spacing:.18em;color:var(--dim);opacity:0;
    transition:opacity .5s ease;pointer-events:none;text-align:center}
  #hint.show{opacity:.65}

  @media (prefers-reduced-motion: reduce){
    #hud{transition:none}
    #startBtn{transition:none}
  }
</style>
</head>
<body>

<div id="stage">
  <canvas id="cv"></canvas>
</div>
<video id="vid" playsinline muted></video>

<div id="gate">
  <h1>PLEXUS</h1>
  <p class="sub">BODY-SCAN LASER GRID<br>CAMERA STAYS LOCAL · NOTHING UPLOADED</p>
  <button id="startBtn">START CAMERA</button>
  <p id="err"></p>
</div>

<div id="fps"></div>
<div id="hint">DOUBLE-TAP TO CYCLE PALETTE</div>
<button id="toggleHud" title="Toggle controls" aria-label="Toggle controls">≡</button>

<div id="hud" class="hidden">
  <label class="chip" id="palChip">PALETTE: <span id="palName">SCAN</span></label>
  <label class="chip on" id="vidChip"><input type="checkbox" id="showVid" checked>FEED</label>
  <label class="chip on" id="rawChip"><input type="checkbox" id="rawOn" checked>RAW</label>
  <label class="chip on" id="sceneChip"><input type="checkbox" id="sceneOn" checked>SCENE</label>
  <label class="chip on" id="dataChip"><input type="checkbox" id="dataOn" checked>DATA</label>
  <label class="chip" id="trailChip"><input type="checkbox" id="trails">TRAILS</label>
  <label class="chip" id="ambChip"><input type="checkbox" id="ambient">AMBIENT</label>
  <label class="chip" id="micChip"><input type="checkbox" id="micOn">AUDIO</label>
  <label class="chip" id="poseChip"><input type="checkbox" id="poseOn">POSE</label>
  <label class="chip on" id="flipChip"><input type="checkbox" id="flip" checked>MIRROR</label>
  <button class="chip" id="calibChip" type="button">RECALIBRATE</button>
  <div class="slider">SENS <input type="range" id="sens" min="5" max="60" value="20"></div>
  <div class="slider">DENSITY <input type="range" id="dens" min="40" max="260" value="150"></div>
  <div class="slider">REACH <input type="range" id="reach" min="50" max="280" value="130"></div>
  <div class="slider">FEED LVL <input type="range" id="feedLvl" min="10" max="100" value="85"></div>
</div>

<script>
(() => {
"use strict";

/* ============ palettes ============ */
const PALETTES = [
  // mono-tone sets — a single hue carries the whole mesh. tint = link/core color.
  {name:"SCAN",   mono:true, tint:[205,214,226], core:[255,255,255]},  // cool steel
  {name:"BONE",   mono:true, tint:[232,224,210], core:[255,252,244]},  // warm off-white
  {name:"PHOSPHOR",mono:true,tint:[120,255,180], core:[220,255,235]},  // green CRT
  {name:"AMBER",  mono:true, tint:[255,176,80],  core:[255,232,196]},  // amber terminal
  {name:"VOID",   mono:true, tint:[120,150,255],  core:[214,224,255]}, // ice blue
  // full-color sets
  {name:"CYBER",  colors:["#00f0ff","#ff00d4","#7b61ff"]},
  {name:"INFERNO",colors:["#ff3300","#ff9900","#ff0066"]},
];
let palIdx = 0;

/* ============ elements ============ */
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d", {alpha:false});
const vid = document.getElementById("vid");
const gate = document.getElementById("gate");
const errEl = document.getElementById("err");
const hud = document.getElementById("hud");
const fpsEl = document.getElementById("fps");
const hintEl = document.getElementById("hint");
const startBtn = document.getElementById("startBtn");

/* offscreen low-res canvas for motion analysis */
const AW = 120, AH = 68;
const an = document.createElement("canvas");
an.width = AW; an.height = AH;
const actx = an.getContext("2d", {willReadFrequently:true});
let prevFrame = null;

/* ============ state ============ */
const S = {
  sens: 20, density: 150, reach: 130, feedLvl: .85,
  showVid: true, trails: false, mirror: true, mic: false,
  data: true, ambient: false, raw: true, scene: true, pose: false,
};
let W = 0, H = 0, DPR = 1;
let points = [];        // tracked body points
let scenePoints = [];   // edge-anchored structure points
let drifters = [];
let sceneFrame = 0;
let nextId = 1;
let audioLevel = 0, bass = 0;
let analyser = null, audioData = null, audioCtx = null;
let totalLinks = 0, activeArea = 0;
let running = false;

/* silhouette: per-pixel background model + foreground mask (low-res AW*AH) */
let bgModel = null;          // Float32 running mean of luma
let fgMask = null;           // Uint8 0/1 foreground
let fgTmp = null;            // scratch for blur/erode
let bgReady = 0;             // frames accumulated into the model
let silhouettePts = [];      // {x,y} normalized contour samples this frame

/* deterministic per-node hue index so colors don't flicker
   as the combined array re-orders each frame */
function colorOf(node, pal){
  return pal[node.cid % pal.length];
}

function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = innerWidth; H = innerHeight;
  cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener("resize", resize, {passive:true});
resize();

function seedDrifters(){
  drifters = [];
  const n = Math.round(Math.min(W,H) / 60);
  for (let i=0;i<n;i++){
    drifters.push({
      x: Math.random()*W, y: Math.random()*H,
      vx:(Math.random()-.5)*.25, vy:(Math.random()-.5)*.25,
      energy:.18, id: 0, cid: (Math.random()*1000)|0, kind:2
    });
  }
}
seedDrifters();
addEventListener("resize", seedDrifters, {passive:true});

/* ============ camera ============ */
async function startCamera(){
  if (running) return;
  errEl.style.display = "none";
  startBtn.disabled = true;
  startBtn.textContent = "CONNECTING…";
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"user", width:{ideal:1280}, height:{ideal:720} },
      audio:false
    });
    vid.srcObject = stream;
    await vid.play();
    running = true;
    gate.classList.add("gone");
    hud.classList.remove("hidden");
    showHint("CALIBRATING — HOLD STILL OR STEP OUT OF FRAME", 4000);
    startLoop();
  }catch(e){
    startBtn.disabled = false;
    startBtn.textContent = "START CAMERA";
    errEl.textContent = "CAMERA ACCESS FAILED — " + (e.name === "NotAllowedError"
      ? "permission denied. Allow camera access and try again."
      : e.message || e.name);
    errEl.style.display = "block";
  }
}

let hintTimer = 0;
function showHint(text, ms){
  hintEl.textContent = text;
  hintEl.classList.add("show");
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => hintEl.classList.remove("show"), ms || 3200);
}

/* ============ audio ============ */
async function startMic(){
  const chip = document.getElementById("micChip");
  const input = document.getElementById("micOn");
  chip.classList.add("pending");
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") await audioCtx.resume();
    const src = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = .82;
    src.connect(analyser);
    audioData = new Uint8Array(analyser.frequencyBinCount);
    S.mic = true;
    chip.classList.remove("pending");
    chip.classList.add("on");
    input.checked = true;
  }catch(e){
    S.mic = false;
    analyser = null;
    input.checked = false;
    chip.classList.remove("pending","on");
  }
}

function updateAudio(){
  if (!S.mic || !analyser){ audioLevel *= .9; bass *= .9; return; }
  analyser.getByteFrequencyData(audioData);
  let sum=0, b=0;
  const bassBins = 8;
  for (let i=0;i<audioData.length;i++){
    sum += audioData[i];
    if (i<bassBins) b += audioData[i];
  }
  audioLevel = sum / (audioData.length*255);
  bass = b / (bassBins*255);
}

/* ============ pose (optional, lazy-loaded MoveNet) ============
   Loads TensorFlow.js + pose-detection from CDN on first enable.
   When active, real skeletal joints drive the mesh. Requires network
   access; the silhouette mesh keeps running if it can't load.        */
let poseDetector = null, poseLoading = false, poseKeypoints = null, poseRunning = false;
// MoveNet 17-keypoint skeleton (COCO order)
const SKELETON = [
  [5,7],[7,9],[6,8],[8,10],        // arms
  [5,6],[5,11],[6,12],[11,12],     // torso
  [11,13],[13,15],[12,14],[14,16], // legs
  [0,1],[0,2],[1,3],[2,4],[0,5],[0,6] // face/neck
];

function loadScript(src){
  return new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = src; s.onload = res; s.onerror = () => rej(new Error("load failed: "+src));
    document.head.appendChild(s);
  });
}

async function startPose(){
  const chip = document.getElementById("poseChip");
  const input = document.getElementById("poseOn");
  if (poseDetector){ S.pose = true; chip.classList.add("on"); input.checked = true; startPoseLoop(); return; }
  if (poseLoading) return;
  poseLoading = true;
  chip.classList.add("pending");
  showHint("LOADING POSE MODEL…", 6000);
  try{
    await loadScript("https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.20.0/dist/tf-core.min.js");
    await loadScript("https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.20.0/dist/tf-backend-webgl.min.js");
    await loadScript("https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js");
    await tf.setBackend("webgl"); await tf.ready();
    poseDetector = await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      {modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING}
    );
    S.pose = true;
    chip.classList.remove("pending"); chip.classList.add("on");
    input.checked = true;
    showHint("POSE LOCKED — TRACKING SKELETON", 2600);
    startPoseLoop();
  }catch(e){
    S.pose = false; poseDetector = null;
    input.checked = false;
    chip.classList.remove("pending","on");
    showHint("POSE MODEL UNAVAILABLE — NEEDS NETWORK", 3200);
  }finally{
    poseLoading = false;
  }
}

async function startPoseLoop(){
  if (poseRunning) return;
  poseRunning = true;
  while (S.pose && poseDetector && running){
    try{
      const poses = await poseDetector.estimatePoses(vid, {flipHorizontal:false});
      poseKeypoints = (poses && poses[0]) ? poses[0].keypoints : null;
    }catch(_){ poseKeypoints = null; }
    await new Promise(r => setTimeout(r, 0)); // yield; model runs ~30fps
  }
  poseRunning = false;
  poseKeypoints = null;
}

/* map a MoveNet keypoint (video pixels) to canvas, honoring mirror + cover-fit */
function mapKp(kp){
  const vw = vid.videoWidth || 1280, vh = vid.videoHeight || 720;
  const vr = vw/vh, sr = W/H;
  let dw, dh, dx, dy;
  if (vr > sr){ dh = H; dw = H*vr; dx = (W-dw)/2; dy = 0; }
  else { dw = W; dh = W/vr; dx = 0; dy = (H-dh)/2; }
  let nx = kp.x / vw;
  if (S.mirror) nx = 1 - nx;
  return { x: dx + nx*dw, y: dy + (kp.y/vh)*dh };
}

/* ============ motion detection ============ */
function detectMotion(){
  if (vid.readyState < 2){ silhouettePts.length = 0; return {hits:[], cur:null}; }
  actx.save();
  if (S.mirror){ actx.translate(AW,0); actx.scale(-1,1); }
  actx.drawImage(vid, 0, 0, AW, AH);
  actx.restore();

  const frame = actx.getImageData(0,0,AW,AH);
  const cur = frame.data;
  const N = AW*AH;
  const hits = [];

  // lazy buffers
  if (!bgModel){
    bgModel = new Float32Array(N);
    fgMask  = new Uint8Array(N);
    fgTmp   = new Uint8Array(N);
    for (let p=0;p<N;p++) bgModel[p] = cur[p*4]*.3 + cur[p*4+1]*.59 + cur[p*4+2]*.11;
    bgReady = 1;
  }

  // frame-difference motion (energy source) — kept from before
  if (prevFrame){
    const thr = S.sens * 3;
    for (let y=1; y<AH-1; y+=2){
      for (let x=1; x<AW-1; x+=2){
        const i = (y*AW + x) * 4;
        const d = Math.abs(cur[i]-prevFrame[i])
                + Math.abs(cur[i+1]-prevFrame[i+1])
                + Math.abs(cur[i+2]-prevFrame[i+2]);
        if (d > thr) hits.push({x:x/AW, y:y/AH, mag:d});
      }
    }
  }
  if (!prevFrame || prevFrame.length !== cur.length) prevFrame = new Uint8ClampedArray(cur.length);
  prevFrame.set(cur);

  // ---- silhouette mask ----
  // adaptive background: slow update everywhere, frozen where foreground is
  // confidently a person, so a still subject doesn't melt into the background.
  const fgThr = 26 + (60 - S.sens);   // higher SENS → easier to call foreground
  let fgCount = 0;
  for (let p=0;p<N;p++){
    const luma = cur[p*4]*.3 + cur[p*4+1]*.59 + cur[p*4+2]*.11;
    const diff = Math.abs(luma - bgModel[p]);
    const fg = diff > fgThr ? 1 : 0;
    fgMask[p] = fg;
    if (fg) fgCount++;
    // learn background only on background pixels (and slowly)
    const rate = fg ? 0.002 : 0.04;
    bgModel[p] += (luma - bgModel[p]) * rate;
  }
  activeArea = fgCount / N;

  // clean the mask: erode once (kill speckle) then dilate once (close gaps)
  morph(fgMask, fgTmp, 0);  // erode
  morph(fgTmp, fgMask, 1);  // dilate

  // extract contour: foreground pixels touching background = the outline
  silhouettePts.length = 0;
  if (bgReady > 8){
    for (let y=1; y<AH-1; y++){
      for (let x=1; x<AW-1; x++){
        const p = y*AW + x;
        if (!fgMask[p]) continue;
        // edge if any 4-neighbor is background
        if (!fgMask[p-1] || !fgMask[p+1] || !fgMask[p-AW] || !fgMask[p+AW]){
          silhouettePts.push({x:x/AW, y:y/AH});
        }
      }
    }
  }
  if (bgReady < 999) bgReady++;

  return {hits, cur};
}

/* 3x3 morphology on a 0/1 mask. mode 0 = erode (min), 1 = dilate (max). */
function morph(src, dst, mode){
  for (let y=0;y<AH;y++){
    for (let x=0;x<AW;x++){
      const p = y*AW+x;
      let v = mode ? 0 : 1;
      for (let dy=-1;dy<=1;dy++){
        const yy = y+dy; if (yy<0||yy>=AH) continue;
        for (let dx=-1;dx<=1;dx++){
          const xx = x+dx; if (xx<0||xx>=AW) continue;
          const s = src[yy*AW+xx];
          v = mode ? (v|s) : (v&s);
        }
      }
      dst[p] = v;
    }
  }
}

/* ============ scene structure ============ */
const CELL = 6;
const SCENE_CAP = 70;
const SCENE_SNAP2 = 26*26;

function detectEdges(cur){
  const found = [];
  const cols = Math.floor(AW/CELL), rows = Math.floor(AH/CELL);
  for (let cy=0; cy<rows; cy++){
    for (let cx=0; cx<cols; cx++){
      let bestMag = 0, bx = cx*CELL, by = cy*CELL;
      const yEnd = Math.min(cy*CELL+CELL-1, AH-2);   // stay in-bounds for +AW*4 read
      const xEnd = Math.min(cx*CELL+CELL-1, AW-2);   // stay in-bounds for +4 read
      for (let y=cy*CELL; y<yEnd; y++){
        for (let x=cx*CELL; x<xEnd; x++){
          const i = (y*AW + x)*4;
          const l  = cur[i]*.3 + cur[i+1]*.59 + cur[i+2]*.11;
          const lr = cur[i+4]*.3 + cur[i+5]*.59 + cur[i+6]*.11;
          const ld = cur[i+AW*4]*.3 + cur[i+AW*4+1]*.59 + cur[i+AW*4+2]*.11;
          const g = Math.abs(l-lr) + Math.abs(l-ld);
          if (g > bestMag){ bestMag = g; bx = x; by = y; }
        }
      }
      if (bestMag > 38) found.push({x:bx/AW, y:by/AH, mag:bestMag});
    }
  }
  found.sort((a,b)=>b.mag-a.mag);
  return found.slice(0, SCENE_CAP*2);
}

function updateScene(cur){
  for (const p of scenePoints) p.life -= .012;
  scenePoints = scenePoints.filter(p => p.life > 0);

  const edges = detectEdges(cur);
  for (const e of edges){
    const ex = e.x*W, ey = e.y*H;
    let captured = null, best = SCENE_SNAP2;
    for (const p of scenePoints){
      const dx = p.x-ex, dy = p.y-ey;
      const d2 = dx*dx+dy*dy;
      if (d2 < best){ best = d2; captured = p; }
    }
    if (captured){
      captured.tx = ex; captured.ty = ey;
      captured.life = Math.min(1, captured.life + .3);
    } else if (scenePoints.length < SCENE_CAP){
      scenePoints.push({ x:ex, y:ey, tx:ex, ty:ey, life:.8,
        energy:.16 + Math.min(.18, e.mag/600), id: 0, cid: nextId++, kind:1 });
    }
  }
  for (const p of scenePoints){
    p.x += (p.tx - p.x) * .2;
    p.y += (p.ty - p.y) * .2;
  }
}

/* ============ body tracking ============ */
const SNAP = 30;
const SNAP2 = SNAP*SNAP;

function updatePoints(hits){
  // build a quick motion-energy lookup on the analysis grid so contour
  // nodes near movement light up
  for (const p of points){
    p.life -= .045;
    p.x += (p.tx - p.x) * .35;
    p.y += (p.ty - p.y) * .35;
  }
  points = points.filter(p => p.life > 0);

  // --- anchor to the silhouette outline (primary) ---
  if (silhouettePts.length){
    // sample the contour down to the density budget
    const budget = Math.max(10, Math.round(S.density * .6));
    const step = Math.max(1, Math.floor(silhouettePts.length / budget));
    for (let i=0; i<silhouettePts.length; i+=step){
      const s = silhouettePts[i];
      const hx = s.x*W, hy = s.y*H;

      // energy from nearby motion
      let en = .25;
      for (let k=0;k<hits.length;k+=3){
        const dx = hits[k].x - s.x, dy = hits[k].y - s.y;
        if (dx*dx+dy*dy < 0.0016){ en = Math.min(1, en + hits[k].mag/600); }
      }

      let captured = null, best = SNAP2;
      for (const p of points){
        const dx = p.x-hx, dy = p.y-hy;
        const d2 = dx*dx+dy*dy;
        if (d2 < best){ best = d2; captured = p; }
      }
      if (captured){
        captured.tx = hx; captured.ty = hy;
        captured.life = Math.min(1.4, captured.life + .5);
        captured.energy = Math.max(captured.energy*.8, en);
      } else if (points.length < S.density){
        const id = nextId++; if (nextId > 4095) nextId = 1;
        points.push({ x:hx, y:hy, tx:hx, ty:hy, life:1, energy:en, id, cid:id, kind:0 });
      }
    }
  } else if (hits.length){
    // fallback before background is learned: original motion seeding
    hits.sort((a,b)=>b.mag-a.mag);
    const budget = Math.max(8, Math.round(S.density * .5));
    const step = Math.max(1, Math.floor(hits.length / budget));
    for (let i=0; i<hits.length; i+=step){
      const h = hits[i];
      const hx = h.x*W, hy = h.y*H;
      const en = Math.min(1, h.mag/300);
      let captured = null, best = SNAP2;
      for (const p of points){
        const dx = p.x-hx, dy = p.y-hy;
        const d2 = dx*dx+dy*dy;
        if (d2 < best){ best = d2; captured = p; }
      }
      if (captured){
        captured.tx = hx; captured.ty = hy;
        captured.life = Math.min(1.4, captured.life + .5);
        captured.energy = Math.max(captured.energy*.7, en);
      } else if (points.length < S.density){
        const id = nextId++; if (nextId > 4095) nextId = 1;
        points.push({ x:hx, y:hy, tx:hx, ty:hy, life:1, energy:en, id, cid:id, kind:0 });
      }
    }
  }

  if (S.ambient){
    for (const d of drifters){
      d.x += d.vx; d.y += d.vy;
      if (d.x<0) d.x=W; else if (d.x>W) d.x=0;
      if (d.y<0) d.y=H; else if (d.y>H) d.y=0;
    }
  }
}

/* ============ render ============ */
function hexToRgb(h){
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}

let lastT = performance.now(), frames = 0, fpsTimer = 0;
let rafId = 0;

/* shape paths — each encodes a node role.
   diamond = body/silhouette, square = scene structure, hexagon = hub. */
function pathDiamond(x,y,r){
  ctx.moveTo(x, y-r); ctx.lineTo(x+r, y); ctx.lineTo(x, y+r); ctx.lineTo(x-r, y); ctx.closePath();
}
function pathSquare(x,y,r,rot){
  for (let k=0;k<4;k++){
    const a = (k/4)*Math.PI*2 + Math.PI/4 + rot;
    const px = x + Math.cos(a)*r, py = y + Math.sin(a)*r;
    if (k===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.closePath();
}
function pathHex(x,y,r,rot){
  for (let k=0;k<6;k++){
    const a = (k/6)*Math.PI*2 + rot;
    const px = x + Math.cos(a)*r, py = y + Math.sin(a)*r;
    if (k===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.closePath();
}

function startLoop(){
  if (rafId) return;            // a loop already owns the frame
  lastT = performance.now();
  rafId = requestAnimationFrame(loop);
}

function loop(t){
  rafId = 0;
  if (!running || document.hidden) return;   // bail; visibilitychange restarts
  rafId = requestAnimationFrame(loop);
  const dt = t - lastT; lastT = t;
  frames++; fpsTimer += dt;
  if (fpsTimer > 500){ fpsEl.textContent = Math.round(frames*1000/fpsTimer) + " FPS"; frames=0; fpsTimer=0; }

  updateAudio();
  const det = detectMotion();
  updatePoints(det.hits);
  if (S.scene && det.cur && (sceneFrame++ % 5 === 0)) updateScene(det.cur);
  if (!S.scene && scenePoints.length) scenePoints.length = 0;

  const palette = PALETTES[palIdx];
  const grey = !!palette.mono;
  const pal = grey ? null : palette.colors.map(hexToRgb);
  const tint = palette.tint, core = palette.core;   // mono colors
  const pulse = 1 + bass * 1.6;

  /* background / trails */
  ctx.globalCompositeOperation = "source-over";
  if (S.trails){
    ctx.fillStyle = "rgba(6,7,10," + (0.22 - bass*0.08) + ")";
    ctx.fillRect(0,0,W,H);
  } else {
    ctx.fillStyle = "#06070a";
    ctx.fillRect(0,0,W,H);
  }

  /* video feed */
  if (S.showVid && vid.readyState >= 2){
    ctx.save();
    ctx.globalAlpha = S.raw ? S.feedLvl : (S.feedLvl + audioLevel*.08);
    if (!S.raw){
      ctx.filter = grey
        ? "saturate(0.55) contrast(1.06) brightness(0.95)"
        : "saturate(0.8) contrast(1.08) brightness(0.92)";
    }
    const vr = vid.videoWidth / vid.videoHeight;
    const sr = W / H;
    let dw, dh, dx, dy;
    if (vr > sr){ dh = H; dw = H*vr; dx = (W-dw)/2; dy = 0; }
    else { dw = W; dh = W/vr; dx = 0; dy = (H-dh)/2; }
    if (S.mirror){ ctx.translate(W,0); ctx.scale(-1,1); dx = W - dx - dw; }
    ctx.drawImage(vid, dx, dy, dw, dh);
    ctx.restore();
    ctx.filter = "none";
    ctx.globalAlpha = 1;
  }

  let nodes = points.concat(scenePoints);
  if (S.ambient) nodes = nodes.concat(drifters);

  /* links */
  ctx.globalCompositeOperation = grey ? "source-over" : "lighter";
  const reach = S.reach * pulse;
  const r2 = reach*reach;
  totalLinks = 0;
  const labelLinks = [];
  for (let i=0;i<nodes.length;i++) nodes[i].deg = 0;

  for (let i=0;i<nodes.length;i++){
    const a = nodes[i];
    let links = 0;
    for (let j=i+1;j<nodes.length && links<5;j++){
      const b = nodes[j];
      const dx = a.x-b.x, dy = a.y-b.y;
      const d2 = dx*dx + dy*dy;
      if (d2 < r2){
        links++; totalLinks++;
        a.deg++; b.deg++;
        const d = Math.sqrt(d2);
        const strength = (1 - d/reach);
        const e = ((a.energy||0)+(b.energy||0))*.5;

        if (grey){
          const al = strength * (0.18 + e*0.5 + bass*0.25);
          ctx.strokeStyle = `rgba(${tint[0]},${tint[1]},${tint[2]},${al})`;
          ctx.lineWidth = (0.4 + strength*1.1 + e*0.8) * pulse;
        } else {
          const c1 = colorOf(a, pal), c2 = colorOf(b, pal);
          const grad = ctx.createLinearGradient(a.x,a.y,b.x,b.y);
          const al = strength * (0.25 + e*0.6 + bass*0.35);
          grad.addColorStop(0, `rgba(${c1[0]},${c1[1]},${c1[2]},${al})`);
          grad.addColorStop(1, `rgba(${c2[0]},${c2[1]},${c2[2]},${al})`);
          ctx.strokeStyle = grad;
          ctx.lineWidth = (0.5 + strength*1.6 + e*1.2) * pulse;
        }
        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.lineTo(b.x,b.y);
        ctx.stroke();

        if (S.data && strength > .45 && e > .25 && ((a.id + (b.id||0)) % 9 === 0) && labelLinks.length < 14){
          labelLinks.push({mx:(a.x+b.x)/2, my:(a.y+b.y)/2, d});
        }
      }
    }
  }

  /* nodes — three shapes by role:
     diamond = tracked body · square = scene structure · hexagon = hub (≥4 links) */
  const spin = t * 0.0012;
  for (let i=0;i<nodes.length;i++){
    const n = nodes[i];
    const e = n.energy || .25;
    const r = (1.6 + e*3.0) * pulse;
    const isHub = (n.deg|0) >= 4;
    const kind = isHub ? 3 : (n.kind|0);   // 0 diamond, 1 square, 2 small-diamond, 3 hexagon

    if (grey){
      const a1 = .45 + e*.5;
      ctx.beginPath();
      if (kind === 1)      pathSquare(n.x, n.y, r*1.05, spin*.4);
      else if (kind === 3) pathHex(n.x, n.y, r*1.25, spin*.6);
      else                 pathDiamond(n.x, n.y, kind===2 ? r*.7 : r);
      ctx.fillStyle = `rgba(${tint[0]},${tint[1]},${tint[2]},${a1})`;
      ctx.fill();
      // hexagon hubs read as hollow rings for contrast
      if (kind === 3){
        ctx.lineWidth = 1;
        ctx.strokeStyle = `rgba(${core[0]},${core[1]},${core[2]},${.5+e*.4})`;
        ctx.stroke();
      }
      // bright pip
      ctx.fillStyle = `rgba(${core[0]},${core[1]},${core[2]},${.6+e*.4})`;
      ctx.beginPath(); ctx.arc(n.x, n.y, Math.max(.6, r*.28), 0, 7); ctx.fill();

      // tracking reticle on hubs and high-energy points
      if (isHub || e > .42){
        const R = r * 2.6, g = R * .42, tk = R - g;
        ctx.save();
        ctx.translate(n.x, n.y);
        ctx.rotate(spin + (n.id||0));
        ctx.strokeStyle = `rgba(${tint[0]},${tint[1]},${tint[2]},${Math.max((e-.42)*1.1, isHub?.3:0)})`;
        ctx.lineWidth = .9;
        ctx.beginPath();
        for (let q=0;q<4;q++){
          const ax = (q===0||q===3)?-1:1;
          const ay = (q<2)?-1:1;
          ctx.moveTo(ax*g, ay*R); ctx.lineTo(ax*g, ay*tk);
          ctx.moveTo(ax*R, ay*g); ctx.lineTo(ax*tk, ay*g);
        }
        ctx.stroke();
        ctx.restore();
      }
    } else {
      const c = colorOf(n, pal);
      const glow = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,r*4);
      glow.addColorStop(0, `rgba(${c[0]},${c[1]},${c[2]},${.5+e*.4})`);
      glow.addColorStop(1, `rgba(${c[0]},${c[1]},${c[2]},0)`);
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(n.x,n.y,r*4,0,7); ctx.fill();
      // shape core matches the role in color mode too
      const rr = r*.8;
      ctx.beginPath();
      if (kind === 1)      pathSquare(n.x, n.y, rr, spin*.4);
      else if (kind === 3) pathHex(n.x, n.y, rr*1.15, spin*.6);
      else                 pathDiamond(n.x, n.y, kind===2 ? rr*.7 : rr);
      ctx.fillStyle = "rgba(255,255,255," + (.7+e*.3) + ")";
      ctx.fill();
      if (kind === 3){
        ctx.lineWidth = 1.2;
        ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},.9)`;
        ctx.stroke();
      }
    }
  }

  /* ============ POSE SKELETON ============ */
  if (S.pose && poseKeypoints){
    const kp = poseKeypoints;
    const lit = grey ? tint : [255,255,255];
    // bones
    ctx.globalCompositeOperation = grey ? "source-over" : "lighter";
    ctx.lineWidth = (1.4 + bass*2) * pulse;
    for (const [a,b] of SKELETON){
      const ka = kp[a], kb = kp[b];
      if (!ka || !kb || ka.score < .3 || kb.score < .3) continue;
      const pa = mapKp(ka), pb = mapKp(kb);
      const al = .35 + Math.min(ka.score, kb.score)*.5 + bass*.2;
      ctx.strokeStyle = `rgba(${lit[0]},${lit[1]},${lit[2]},${al})`;
      ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
    }
    // joints — diamonds, consistent with the node language
    for (let i=0;i<kp.length;i++){
      const k = kp[i]; if (!k || k.score < .3) continue;
      const p = mapKp(k);
      const r = (2.2 + k.score*3.5) * pulse;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y-r); ctx.lineTo(p.x+r, p.y);
      ctx.lineTo(p.x, p.y+r); ctx.lineTo(p.x-r, p.y); ctx.closePath();
      ctx.fillStyle = grey
        ? `rgba(${core[0]},${core[1]},${core[2]},${.5+k.score*.5})`
        : `rgba(255,255,255,${.5+k.score*.5})`;
      ctx.fill();
    }
    ctx.globalCompositeOperation = "source-over";
  }

  /* ============ DATA LAYER ============ */
  if (S.data){
    ctx.globalCompositeOperation = "source-over";
    ctx.font = "9px ui-monospace, Menlo, Consolas, monospace";
    ctx.textBaseline = "middle";

    ctx.fillStyle = "rgba(190,200,214,.75)";
    for (const L of labelLinks){
      ctx.fillText("Δ" + Math.round(L.d), L.mx + 4, L.my - 4);
    }

    const tagged = points
      .filter(p => p.energy > .4)
      .sort((a,b)=>b.energy-a.energy)
      .slice(0, 8);
    for (const p of tagged){
      const tag = "N" + p.id.toString(16).toUpperCase().padStart(3,"0");
      ctx.strokeStyle = "rgba(190,200,214,.5)";
      ctx.lineWidth = .75;
      ctx.beginPath();
      ctx.moveTo(p.x + 4, p.y - 4);
      ctx.lineTo(p.x + 16, p.y - 14);
      ctx.lineTo(p.x + 58, p.y - 14);
      ctx.stroke();
      ctx.fillStyle = "rgba(235,240,248,.9)";
      ctx.fillText(tag, p.x + 18, p.y - 20);
      ctx.fillStyle = "rgba(160,170,186,.8)";
      ctx.fillText(Math.round(p.x) + "," + Math.round(p.y), p.x + 18, p.y - 9);
    }

    const lines = [
      "NODES  " + points.length.toString().padStart(4," "),
      "SCENE  " + scenePoints.length.toString().padStart(4," "),
      "LINKS  " + totalLinks.toString().padStart(4," "),
      "MOTION " + (activeArea*100).toFixed(1).padStart(5," ") + "%",
      "REACH  " + Math.round(reach).toString().padStart(4," ") + "px",
    ];
    if (S.mic) lines.push("BASS   " + (bass*100).toFixed(0).padStart(4," ") + "%");
    if (S.pose){
      const j = poseKeypoints ? poseKeypoints.filter(k=>k.score>.3).length : 0;
      lines.push("JOINTS " + j.toString().padStart(4," ") + "/17");
    }
    ctx.fillStyle = "rgba(150,160,176,.85)";
    ctx.font = "10px ui-monospace, Menlo, Consolas, monospace";
    let ty = 46;
    for (const ln of lines){ ctx.fillText(ln, 14, ty); ty += 14; }

    // shape legend — makes the three-shape vocabulary legible
    ty += 6;
    const lg = grey ? tint : [190,200,214];
    const legend = [["◆","BODY",0],["■","SCENE",1],["⬡","HUB",3]];
    ctx.strokeStyle = `rgba(${lg[0]},${lg[1]},${lg[2]},.8)`;
    ctx.fillStyle = `rgba(${lg[0]},${lg[1]},${lg[2]},.8)`;
    ctx.lineWidth = 1;
    for (const [, label, k] of legend){
      ctx.beginPath();
      if (k === 1) pathSquare(20, ty, 3.2, 0);
      else if (k === 3) pathHex(20, ty, 4, 0);
      else pathDiamond(20, ty, 3.6);
      if (k === 3) ctx.stroke(); else ctx.fill();
      ctx.fillText(label, 30, ty);
      ty += 14;
    }
  }

  ctx.globalCompositeOperation = "source-over";
}

/* pause render when tab hidden — saves battery, avoids dt spikes */
document.addEventListener("visibilitychange", () => {
  if (document.hidden) return;
  if (running) startLoop();
});

/* ============ controls ============ */
startBtn.addEventListener("click", startCamera);

function cyclePalette(){
  palIdx = (palIdx+1) % PALETTES.length;
  document.getElementById("palName").textContent = PALETTES[palIdx].name;
}

function bindChip(chipId, inputId, key, onEnable){
  const chip = document.getElementById(chipId);
  const input = document.getElementById(inputId);
  input.addEventListener("change", () => {
    if (onEnable){
      // gated toggles (mic) manage their own state in the handler
      if (input.checked){ onEnable(); }
      else { S[key] = false; chip.classList.remove("on","pending"); }
      return;
    }
    S[key] = input.checked;
    chip.classList.toggle("on", input.checked);
  });
}
bindChip("vidChip","showVid","showVid");
bindChip("rawChip","rawOn","raw");
bindChip("sceneChip","sceneOn","scene");
bindChip("dataChip","dataOn","data");
bindChip("trailChip","trails","trails");
bindChip("ambChip","ambient","ambient");
bindChip("flipChip","flip","mirror");
bindChip("micChip","micOn","mic", startMic);
bindChip("poseChip","poseOn","pose", startPose);

document.getElementById("calibChip").addEventListener("click", () => {
  bgReady = 0; bgModel = null;   // forces re-seed next frame
  showHint("RECALIBRATING — HOLD STILL", 2600);
});

document.getElementById("sens").addEventListener("input", e => S.sens = +e.target.value);
document.getElementById("dens").addEventListener("input", e => S.density = +e.target.value);
document.getElementById("reach").addEventListener("input", e => S.reach = +e.target.value);
document.getElementById("feedLvl").addEventListener("input", e => S.feedLvl = +e.target.value/100);

document.getElementById("palChip").addEventListener("click", cyclePalette);
document.getElementById("toggleHud").addEventListener("click", () => hud.classList.toggle("hidden"));

let lastTap = 0;
cv.addEventListener("pointerdown", () => {
  const now = Date.now();
  if (now - lastTap < 300) cyclePalette();
  lastTap = now;
});
})();
</script>
</body>
