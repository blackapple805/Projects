# logstash.conf — parse the traffic CSV and load it into Elasticsearch.
#
# Reads every CSV under /usr/share/logstash/data (mounted from ./data),
# matches the exact columns produced by scripts/har_to_csv.py, parses the
# timestamp and numeric fields, and geolocates the responding server IP so
# Kibana can plot it on a map.

input {
  file {
    # This is the in-container path. docker-compose mounts ./data here.
    path => "/usr/share/logstash/csv/*.csv"
    start_position => "beginning"
    sincedb_path => "/dev/null"   # always re-read from the top (lab use)
    mode => "read"
    exit_after_read => true        # finish and idle once the files are read
  }
}

filter {
  csv {
    separator => ","
    # Must match the header order in scripts/har_to_csv.py exactly.
    columns => [
      "timestamp", "method", "url", "host", "scheme", "path", "extension",
      "status", "status_text", "response_bytes", "time_ms", "mime_type",
      "server_ip", "referer", "user_agent"
    ]
    skip_header => true
  }

  # Use the capture time as the event time.
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Make numbers numeric so Kibana can aggregate on them.
  mutate {
    convert => {
      "status"         => "integer"
      "response_bytes" => "integer"
      "time_ms"        => "integer"
    }
  }

  # Geolocate the responding server -> adds geo.location for the map.
  if [server_ip] and [server_ip] != "" and [server_ip] != "N/A" {
    geoip {
      source => "server_ip"
      target => "geo"
    }
  }

  # Drop only metadata we don't need. NOTE: we keep `host` — the CSV parse
  # overwrites Logstash's input host with the real request hostname.
  mutate {
    remove_field => ["message", "@version", "log", "event", "timestamp"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "traffic"
    # Install a template so geo.location is always a geo_point (needed for the
    # Maps layer). Without this, a fresh index maps it as plain lat/lon floats
    # and the map can't plot anything.
    manage_template => true
    template => "/usr/share/logstash/templates/traffic.json"
    template_name => "traffic"
    template_overwrite => true
  }
  # Uncomment to watch events stream by in `docker compose logs -f logstash`:
  # stdout { codec => rubydebug }
}
