<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="JobFinder logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="0.55" stop-color="#4338ca"/>
      <stop offset="1" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="needle" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#080b1a" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Rounded squircle backdrop -->
  <rect x="40" y="40" width="432" height="432" rx="116" fill="url(#bg)" filter="url(#soft)"/>
  <rect x="40" y="40" width="432" height="432" rx="116" fill="url(#glow)"/>
  <rect x="40.5" y="40.5" width="431" height="431" rx="115.5" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- Compass tick ring -->
  <g stroke="#ffffff" stroke-opacity="0.30" stroke-width="6" stroke-linecap="round">
    <line x1="256" y1="116" x2="256" y2="138"/>
    <line x1="256" y1="374" x2="256" y2="396"/>
    <line x1="116" y1="256" x2="138" y2="256"/>
    <line x1="374" y1="256" x2="396" y2="256"/>
  </g>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="3"/>

  <!-- Compass needle / location pin -->
  <!-- North (amber) blade -->
  <path d="M256 150 L304 256 L256 300 L208 256 Z" fill="url(#needle)"/>
  <!-- South (muted) blade -->
  <path d="M256 362 L208 256 L256 300 L304 256 Z" fill="#ffffff" fill-opacity="0.42"/>
  <!-- Center hub -->
  <circle cx="256" cy="256" r="30" fill="#0c0f24"/>
  <circle cx="256" cy="256" r="30" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="3"/>
  <circle cx="256" cy="256" r="11" fill="url(#needle)"/>
</svg>
